<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mahavir Agravat Portfolio</title>

<style>

/* GOOGLE FONT */
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#000;
color:#fff;
}

/* NAVBAR */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 80px;
position:fixed;
width:100%;
background:black;
z-index:1000;
}

.logo{
font-size:24px;
font-weight:600;
}

nav ul{
display:flex;
gap:30px;
list-style:none;
}

nav a{
color:white;
text-decoration:none;
transition:0.3s;
}

nav a:hover{
color:#f7b733;
}

/* HERO SECTION */
.hero{
display:flex;
align-items:center;
justify-content:space-between;
min-height:100vh;
padding:0 80px;
}

/* LEFT TEXT */
.hero-text{
max-width:600px;
}

.hero-text small{
color:#f7b733;
letter-spacing:2px;
}

.hero-text h1{
font-size:70px;
margin:15px 0;
}

.hero-text span{
color:#f7b733;
}

.hero-text p{
font-size:22px;
margin:20px 0;
color:#ccc;
}

/* BUTTON */
.btn{
display:inline-block;
background:#f7b733;
color:black;
padding:12px 30px;
border-radius:30px;
text-decoration:none;
font-weight:600;
}

/* RIGHT IMAGE */
.hero-img img{
width:420px;
border-radius:15px;
box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

/* MOBILE RESPONSIVE */
@media(max-width:900px){

.hero{
flex-direction:column;
text-align:center;
padding-top:120px;
}

.hero-text h1{
font-size:40px;
}

.hero-img img{
width:260px;
margin-top:40px;
}

nav{
padding:20px;
}

nav ul{
display:none;
}
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
<div class="logo">Mahavir Agravat</div>

<ul>
<li><a href="#">Home</a></li>
<li><a href="#">About</a></li>
<li><a href="#">Resume</a></li>
<li><a href="#">Projects</a></li>
<li><a href="#">Contact</a></li>
</ul>
</nav>

<!-- HERO -->
<section class="hero">

<div class="hero-text">
<small>HELLO!</small>
<h1>I'm <span>Mahavir Agravat</span></h1>
<p>Graduate Engineer Trainee</p>
<a href="#" class="btn">Hire Me</a>
</div>

<div class="hero-img">
<img src="profile.jpg" alt="Mahavir Agravat">
</div>

</section>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahavir Agravat | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f9b233;
            --bg: #000000;
            --card-bg: #0a0a0a;
            --text-main: #ffffff;
            --text-dim: #aaaaaa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            position: fixed;
            width: 100%;
            top: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo { font-size: 24px; font-weight: 700; color: var(--primary); text-decoration: none; }
        
        /* Desktop Links */
        .nav-links { display: flex; gap: 30px; list-style: none; }
        .nav-links a { color: var(--text-main); text-decoration: none; font-size: 14px; transition: 0.3s; font-weight: 500; }
        .nav-links a:hover { color: var(--primary); }

        /* Mobile Menu Button */
        .menu-toggle {
            display: none;
            cursor: pointer;
            color: var(--primary);
            font-size: 24px;
        }

        /* --- HERO SECTION --- */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 8% 50px;
            background-color: #000000; /* Reference jaisa dark background */
        }

        .hero-container {
            display: flex;
            align-items: center;
            justify-content: space-between; /* Split layout */
            width: 100%;
            max-width: 1200px;
        }

        .hero-text {
            flex: 1.2; /* Text ko thodi zyada space */
            z-index: 3;
        }

        .hero-text span.greet { color: var(--primary); letter-spacing: 4px; font-weight: 600; font-size: 14px; display: block; margin-bottom: 15px; }
        .hero-text h1 { font-size: clamp(40px, 5vw, 70px); line-height: 1.1; font-weight: 800; color: #ffffff; }
        .hero-text h1 span { color: var(--primary); }
        .hero-text h3 { font-size: 24px; font-weight: 600; margin-top: 15px; color: #fff; }
        .hero-text p { color: var(--text-dim); margin: 10px 0 35px; font-size: 18px; }

        .hero-img {
            flex: 1; /* Image side mein fit hogi */
            display: flex;
            justify-content: flex-end; /* Right side alignment */
            position: relative;
        }

        /* Reference image jaisa circular halo glow effect */
        .hero-img::after {
            content: '';
            position: absolute;
            top: 50%;
            right: 50%;
            transform: translate(50%, -50%);
            width: 80%;
            height: 80%;
            background: radial-gradient(circle, rgba(249, 178, 51, 0.15) 0%, rgba(0,0,0,0) 70%);
            z-index: 1;
        }

        .hero-img img {
            width: auto;
            max-height: 80vh; /* Image height logic taaki feet na katein */
            max-width: 100%;
            z-index: 2;
            filter: drop-shadow(0 0 30px rgba(249, 178, 51, 0.1)); /* Soft edges glow */
        }

        /* Social Buttons */
        .social-btns { display: flex; gap: 15px; margin-top: 30px; }
        .social-btns .btn {
            padding: 12px 30px; border-radius: 50px; text-decoration: none;
            font-weight: 700; display: flex; align-items: center; gap: 10px; transition: 0.3s;
        }
        .btn.primary { background: var(--primary); color: #000; }
        .btn.outline { border: 2px solid var(--primary); color: var(--primary); }
        .btn:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(249, 178, 51, 0.3); }

        /* --- MOBILE RESPONSIVENESS (Stacked Layout) --- */
        @media(max-width: 992px) {
            nav { padding: 15px 5%; }
            .nav-links { display: none; }
            .menu-toggle { display: block; } /* Show menu button */
            
            .hero { padding: 100px 5% 50px; }
            .hero-container { 
                flex-direction: column; /* Upar-neeche layout */
                text-align: center; 
            }

            .hero-img { 
                order: -1; /* Image text se upar lane ke liye */
                justify-content: center;
                margin-bottom: 30px;
                width: 100%;
            }

            .hero-img img { 
                max-width: 280px; /* Mobile par compact size */
                max-height: auto;
            }

            .hero-text h1 { font-size: 36px; }
            .hero-text h3 { font-size: 18px; }
            .social-btns { justify-content: center; flex-wrap: wrap; }
            
            /* Mobile side menu animation */
            .nav-links.active {
                display: flex; flex-direction: column; position: absolute; top: 70px; left: 0;
                width: 100%; background: rgba(0,0,0,0.98); padding: 30px; border-bottom: 2px solid var(--primary);
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#home" class="logo">Mahavir.</a>
        
        <div class="menu-toggle" onclick="toggleMenu()">
            <i class="fas fa-bars"></i>
        </div>

        <ul class="nav-links" id="navLinks">
            <li><a href="#home" onclick="toggleMenu()">Home</a></li>
            <li><a href="#about" onclick="toggleMenu()">About Me</a></li>
            <li><a href="#projects" onclick="toggleMenu()">Projects</a></li>
            <li><a href="#resume" onclick="toggleMenu()">Resume</a></li>
            <li><a href="#contact" onclick="toggleMenu()">Contact</a></li>
        </ul>
    </nav>

    <section class="hero" id="home">
        <div class="hero-container">
            <div class="hero-text">
                <span class="greet">HELLO!</span>
                <h1>I'm <span>Mahavir <br>Agravat</span></h1>
                <h3>Graduate Engineer Trainee</h3>
                
                <div class="social-btns">
                    <a href="https://github.com/Mahavir-Agravat" target="_blank" class="btn primary">
                        <i class="fab fa-github"></i> GITHUB
                    </a>
                    <a href="https://linkedin.com/in/mahavir-agravat" target="_blank" class="btn outline">
                        <i class="fab fa-linkedin"></i> LINKEDIN
                    </a>
                </div>
            </div>
            <div class="hero-img">
                <img src="Mahavir_FullBody.png" alt="Mahavir Agravat">
            </div>
        </div>
    </section>

    <script>
        function toggleMenu() {
            document.getElementById("navLinks").classList.toggle("active");
        }
    </script>
</body>
</html>

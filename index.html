<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mahavir Agravat Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:black;
color:white;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
position:fixed;
width:100%;
top:0;
background:black;
z-index:1000;
}

.logo{
font-size:24px;
font-weight:700;
}

.nav-links{
display:flex;
gap:30px;
}

.nav-links a{
color:white;
text-decoration:none;
}

.menu-btn{
display:none;
font-size:26px;
cursor:pointer;
}

/* HERO SECTION */

.hero{
min-height:100vh;
display:flex;
align-items:center;
justify-content:space-between;
padding:120px 8% 50px;
}

.hero-text{
max-width:500px;
}

.hero-text span{
color:#f9b233;
letter-spacing:2px;
}

.hero-text h1{
font-size:60px;
margin:10px 0;
}

.hero-text h1 span{
color:#f9b233;
}

.hero-text p{
color:#ccc;
margin:20px 0;
font-size:18px;
}

.btn{
background:#f9b233;
color:black;
padding:12px 30px;
border-radius:30px;
display:inline-block;
text-decoration:none;
font-weight:600;
}

.hero-img img{
width:420px;
border-radius:15px;
}

/* MOBILE */

@media(max-width:900px){

.hero{
flex-direction:column;
text-align:center;
}

.hero-img img{
width:280px;
margin-top:40px;
}

.nav-links{
position:absolute;
top:70px;
right:0;
background:black;
flex-direction:column;
width:200px;
padding:20px;
display:none;
}

.nav-links.show{
display:flex;
}

.menu-btn{
display:block;
}

}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
<div class="logo">Mahavir Agravat</div>

<div class="nav-links" id="menu">
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Projects</a>
<a href="#">Certifications</a>
<a href="#">Resume</a>
<a href="#">Portfolio</a>
<a href="#">Contact</a>
</div>

<div class="menu-btn" onclick="toggleMenu()">☰</div>
</nav>

<!-- HERO SECTION -->
<section class="hero">

<div class="hero-text">
<span>HELLO!</span>
<h1>I'm <span>Mahavir Agravat</span></h1>
<p>Graduate Engineer Trainee</p>
<a href="#" class="btn">Hire Me</a>
</div>

<div class="hero-img">
<img src="profile.jpg" alt="Mahavir">
</div>

</section>

<script>
function toggleMenu(){
document.getElementById("menu").classList.toggle("show");
}
</script>

</body>
</html>
